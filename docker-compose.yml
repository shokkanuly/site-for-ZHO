services:
  postgres:
    image: postgres:15-alpine
    container_name: temirtau_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: temirtau_volunteer
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: temirtau_redis
    ports:
      - "6379:6379"

volumes:
  pgdata:
